name: VelaCalendar
options:
  bundleIdPrefix: com.vela
  deploymentTarget:
    iOS: "16.0"

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosApp
        excludes:
          - Info.plist
      - path: ../../shared-ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vela.calendar
        INFOPLIST_FILE: iosApp/Info.plist
        SWIFT_VERSION: "5.9"
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../ui/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS: "$(inherited) -framework CalendarUI -lsqlite3"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: H26JH26LJW
        ENABLE_DEBUG_DYLIB: NO
        DEAD_CODE_STRIPPING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    preBuildScripts:
      - name: Build KMP Framework
        script: |
          cd "$SRCROOT/../../.."
          ./gradlew :apps:calendar:ui:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
