# Vela detekt configuration — built upon the default config.
# SPDX-License-Identifier: Apache-2.0

build:
  maxIssues: 0
  weights: {}

complexity:
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
    ignoreDefaultParameters: true
    ignoreAnnotated: ['Composable']
  TooManyFunctions:
    active: false
  LongMethod:
    threshold: 80
    ignoreAnnotated: ['Composable', 'Preview']

style:
  # Disabled: pure noise in a design-system (color/dp tokens) and a math engine (operator
  # precedence, formatting thresholds). Meaningful constants are still named where it aids reading.
  MagicNumber:
    active: false
  MaxLineLength:
    maxLineLength: 120

naming:
  FunctionNaming:
    functionPattern: '[a-z][a-zA-Z0-9]*'
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_A-Za-z0-9]*'
  # Compose theme/contract files commonly group several small declarations; don't force one-per-file.
  MatchingDeclarationName:
    active: false

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
